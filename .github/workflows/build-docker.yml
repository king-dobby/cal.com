name: Build Cal.com Docker Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: amorris3925/calcom-unlocked

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/amorris3925/calcom-unlocked:latest
          build-args: |
            NEXT_PUBLIC_IS_E2E=1
            NEXT_PUBLIC_LICENSE_CONSENT=agree
            CALCOM_TELEMETRY_DISABLED=1
            NEXTAUTH_SECRET=buildtimesecret
            CALENDSO_ENCRYPTION_KEY=buildtimekey1234567
            DATABASE_URL=postgresql://fake:fake@localhost:5432/fake
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

